spring.application.name=control
# Habilitar la consola web de H2 para ver las tablas
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuración de la conexión (En memoria)
spring.datasource.url=jdbc:h2:file:./data/midb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Mostrar el SQL que genera Spring en la consola
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.maximum-pool-size=1
